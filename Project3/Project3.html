<!DOCTYPE html>
<html>

<head>
    <title>JavaScript Circle Animation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            margin-right: 10px;
            width: 200px;
            text-align: right;
        }

        label small {
            font-style: italic;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            margin-right: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #startButton {
            background-color: #4CAF50;
            color: white;
        }

        #startButton:hover {
            background-color: #45a049;
        }

        #pauseButton {
            background-color: #FFC107;
            color: white;
        }

        #pauseButton:hover {
            background-color: #e0a800;
        }

        #stopButton {
            background-color: #f44336;
            color: white;
        }

        #stopButton:hover {
            background-color: #d32f2f;
        }

        #resetButton {
            background-color: #008CBA;
            color: white;
        }

        #resetButton:hover {
            background-color: #007bb5;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .circle {
            width: 25vw;
            height: 25vw;
            border-radius: 50%;
            border: 15px solid gray;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-sizing: border-box;
            background: conic-gradient(gray 100%, gray 100%);
            margin-right: 50px;
        }

        .percentage-text {
            color: black;
            font-size: 18px;
            font-weight: bold;
        }

        .announcement {
            color: yellow;
            font-weight: bold;
            margin-top: 10px;
        }

        .message {
            text-align: left;
            max-width: 300px;
        }

        .loop-message {
            font-size: 18px;
            margin: 10px 0;
            color: #555;
        }

        #importantNote {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h2>Looping System</h2>
    <div id="controls">
        <div class="input-group">
            <label for="condition">Condition <small>(How many times)</small>:</label>
            <input id="inputid" type="text" placeholder="Enter a number">
        </div>
        <div class="input-group">
            <button id="startButton" onclick="startLoop()">Start</button>
            <button id="pauseButton" onclick="pauseLoop()">Pause</button>
            <button id="stopButton" onclick="stopLoop()">Stop & Check</button>
            <button id="resetButton" onclick="resetLoop()">Reset</button>
        </div>
    </div>

    <div id="container">
        <div class="circle" id="circle">
            <span id="percentageText" class="percentage-text">0%</span>
            <div id="announcementText" class="announcement"></div>
        </div>
        <div class="message" id="message"></div>
    </div>

    <div id="importantNote"> Just assume that "circle is a kind of block" which repeats based on your Condition
    </div>

    <script>
        let stopFlag = false;
        let pauseFlag = false;
        let interval;
        let count = 0;
        let percentage = 0;

        function startLoop() {
            stopFlag = false;
            pauseFlag = false;
            const inputValue = parseInt(document.getElementById("inputid").value);
            const circle = document.getElementById("circle");
            const messageDiv = document.getElementById("message");
            const percentageText = document.getElementById("percentageText");
            const announcementText = document.getElementById("announcementText");

            if (isNaN(inputValue) || inputValue <= 0) {
                alert("Please enter a valid positive number!");
                return;
            }

            count = 0;
            messageDiv.innerHTML = "";
            announcementText.innerText = "";
            circle.style.borderColor = "gray";
            percentageText.innerText = "0%";

            function loopCircle() {
                if (count < inputValue && !stopFlag && !pauseFlag) {
                    count++;
                    let message = `<p class="loop-message" id="message-${count}">${count} time(s) circle is repeating</p>`;
                    messageDiv.innerHTML += message;
                    announceLoop(count);
                    circle.style.borderColor = "gray";

                    percentage = 0;
                    percentageText.innerText = `${percentage}%`;

                    interval = setInterval(() => {
                        if (stopFlag || pauseFlag) {
                            clearInterval(interval);
                            return;
                        }

                        percentage += 2;
                        percentageText.innerText = `${Math.min(percentage, 100)}%`;
                        const degrees = (percentage / 100) * 360;
                        circle.style.background = `conic-gradient(blue 0deg, blue ${degrees}deg, gray ${degrees}deg)`;

                        if (percentage >= 100) {
                            clearInterval(interval);

                            let messageElement = document.getElementById(`message-${count}`);
                            messageElement.innerHTML = `${count} time(s) circle is completed`;

                            setTimeout(() => {
                                if (count < inputValue) loopCircle();
                            }, 1000);
                        }
                    }, 50);
                }
            }

            loopCircle();
        }

        function announceLoop(loopCount) {
            const announcementText = document.getElementById("announcementText");
            announcementText.innerText = `You are in loop ${loopCount} (Increment Step)`;
            setTimeout(() => {
                announcementText.innerText = "";
            }, 3000);
        }

        function pauseLoop() {
            pauseFlag = true;
        }

        function stopLoop() {
            stopFlag = true;
            clearInterval(interval);
        }

        function resetLoop() {
            stopFlag = true;
            clearInterval(interval);
            count = 0;
            percentage = 0;
            const circle = document.getElementById("circle");
            const messageDiv = document.getElementById("message");
            const percentageText = document.getElementById("percentageText");
            const announcementText = document.getElementById("announcementText");

            circle.style.borderColor = "gray";
            circle.style.background = "conic-gradient(gray 100%, gray 100%)";
            messageDiv.innerHTML = "";
            percentageText.innerText = "0%";
            announcementText.innerText = "";
        }
    </script>
</body>

</html>
